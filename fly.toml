# fly.toml app configuration file generated for memento-vault-vic on 2026-04-10T16:12:13Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'memento-vault-vic'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  MEMENTO_HOST = '0.0.0.0'
  MEMENTO_PORT = '8745'
  MEMENTO_TRANSPORT = 'streamable-http'
  MEMENTO_VAULT_PATH = '/vault'
  PYTHONPATH = '/app'

[[mounts]]
  source = 'vault_data'
  destination = '/vault'

[http_service]
  internal_port = 8745
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
